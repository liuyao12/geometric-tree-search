<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Turtle Tiling Game</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="shell">
    <header>
      <p><a href="../../">← GCTS home</a></p>
      <h1>Turtle Tiling Game</h1>
      <p class="lede">A one-player tiling toy: build a marked turtle corona around a central <strong>Trefoil</strong> tile, then click a turtle touching it to flip the local pair.</p>
    </header>
    <section class="toolbar" aria-label="Game controls">
      <button id="build">Initialize turtle tiling</button>
      <label>corona <input id="coronaTarget" type="number" min="1" max="12" value="6"></label>
      <button id="resetView" aria-label="Reset trefoil to center">↺</button>
      <span class="stripes-label">stripes:</span>
      <label><input id="blueStripes" type="checkbox" checked> blue</label>
      <label><input id="orangeStripes" type="checkbox" checked> orange</label>
      <span id="status" aria-live="polite">ready</span>
    </section>
    <canvas id="board" width="1200" height="780" aria-label="Turtle Tiling Game board"></canvas>

  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
