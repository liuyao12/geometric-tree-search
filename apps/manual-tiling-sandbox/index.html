<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manual Tiling Sandbox</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="shell">
    <header>
      <p><a href="../../">← GCTS home</a></p>
      <h1>Manual Tiling Sandbox</h1>
      <p class="lede">Grab a tile from the left palette, drag out a copy, and drop it anywhere. Existing tiles can be grabbed from any point and moved smoothly without snapping.</p>
    </header>
    <section class="toolbar" aria-label="Manual tiling controls">
      <button id="clearBoard" type="button">Clear board</button>
      <span id="status" aria-live="polite">ready</span>
    </section>
    <canvas id="sandbox" width="1400" height="840" aria-label="Manual tile dragging sandbox"></canvas>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
